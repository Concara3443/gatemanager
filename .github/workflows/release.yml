name: Release

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Compilar GateManager.exe
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Instalar PyInstaller y dependencias
        run: pip install pyinstaller pillow

      - name: Compilar ejecutable
        run: pyinstaller lebl_parking.spec --clean -y

      - name: Verificar exe generado
        run: dir dist\GateManager.exe

      - name: Subir GateManager.exe a la release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/GateManager.exe
          token: ${{ secrets.GITHUB_TOKEN }}
